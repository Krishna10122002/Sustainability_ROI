<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sustainability ROI Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🌱 Sustainability ROI Calculator</h1>

<div class="calculator">

<div class="input-box">
<label>Initial Investment (₹)</label>
<input type="number" id="investment" placeholder="100000">
</div>

<div class="input-box">
<label>Annual Savings (₹)</label>
<input type="number" id="savings" placeholder="30000">
</div>

<div class="input-box">
<label>Government Incentives (₹)</label>
<input type="number" id="incentives" placeholder="10000">
</div>

<div class="input-box">
<label>Maintenance Cost / Year (₹)</label>
<input type="number" id="maintenance" placeholder="5000">
</div>

<div class="input-box">
<label>Project Life (Years)</label>
<input type="number" id="life" placeholder="10">
</div>

<div class="input-box">
<label>Carbon Reduction (Ton CO₂)</label>
<input type="number" id="carbon" placeholder="25">
</div>

<div class="input-box">
<label>Water Saved (Litres)</label>
<input type="number" id="water" placeholder="50000">
</div>

<div class="input-box">
<label>Waste Reduced (kg)</label>
<input type="number" id="waste" placeholder="1000">
</div>

<button onclick="calculateROI()">
Calculate Sustainability ROI
</button>

</div>

<div class="results">

<div class="card">
<h3>ROI</h3>
<p id="roi">0%</p>
</div>

<div class="card">
<h3>Net Profit</h3>
<p id="profit">₹0</p>
</div>

<div class="card">
<h3>Payback Period</h3>
<p id="payback">0 Years</p>
</div>

<div class="card">
<h3>Sustainability Score</h3>
<p id="score">0 /100</p>
</div>

<div class="card">
<h3>Rating</h3>
<p id="rating">-</p>
</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
