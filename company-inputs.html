<div class="row g-3">

<div class="col-md-4">
<label>Investment</label>
<input id="investment"
class="form-control"
type="number">
</div>

<div class="col-md-4">
<label>Savings</label>
<input id="savings"
class="form-control"
type="number">
</div>

<div class="col-md-4">
<label>Revenue</label>
<input id="revenue"
class="form-control"
type="number">
</div>

<div class="col-md-4">
<label>Risk Reduction</label>
<input id="risk"
class="form-control"
type="number">
</div>

<div class="col-md-4">
<label>Operating Cost</label>
<input id="operating"
class="form-control"
type="number">
</div>

</div>

<!-- Header -->

<section class="hero py-5">

<div class="container">

<h1 class="display-5 fw-bold">

Company Inputs

</h1>

<p>

Enter company financial and operational information.

</p>

</div>

</section>

<!-- FORM -->

<div class="container py-5">

<div class="card shadow-lg p-4">

<h3 class="mb-4">

Financial Parameters

</h3>

<div class="row">

<div class="col-md-6 mb-3">

<label>Company Name</label>

<input
type="text"
class="form-control"
placeholder="ABC Manufacturing">

</div>

<div class="col-md-6 mb-3">

<label>Industry</label>

<select class="form-select">

<option>Manufacturing</option>

<option>Automobile</option>

<option>Healthcare</option>

<option>Energy</option>

<option>Pharmaceutical</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Annual Revenue (₹)</label>

<input
type="number"
class="form-control"
value="80000000">

</div>

<div class="col-md-6 mb-3">

<label>WACC (%)</label>

<input
type="number"
class="form-control"
value="12">

</div>

<div class="col-md-6 mb-3">

<label>Profit Margin (%)</label>

<input
type="number"
class="form-control"
value="25">

</div>

<div class="col-md-6 mb-3">

<label>Corporate Tax (%)</label>

<input
type="number"
class="form-control"
value="25">

</div>

</div>

</div>

</div>

<!-- ================= Emissions Baseline ================= -->

<div class="container-fluid px-5 py-5">

    <div class="card shadow-lg border-0 p-5">

        <h2 class="fw-bold mb-5">Emissions Baseline</h2>

        <!-- Scope Inputs -->

        <div class="row g-4 mb-5">

            <div class="col-lg-4">
                <label class="form-label fw-semibold">
                    Scope 1 (tCO₂e)
                </label>

                <input
                    type="number"
                    id="scope1"
                    class="form-control form-control-lg"
                    value="50000">
            </div>

            <div class="col-lg-4">
                <label class="form-label fw-semibold">
                    Scope 2 (tCO₂e)
                </label>

                <input
                    type="number"
                    id="scope2"
                    class="form-control form-control-lg"
                    value="70000">
            </div>

            <div class="col-lg-4">
                <label class="form-label fw-semibold">
                    Scope 3 (tCO₂e)
                </label>

                <input
                    type="number"
                    id="scope3"
                    class="form-control form-control-lg"
                    value="200000">
            </div>

        </div>

        <!-- Button -->

        <button
            class="btn btn-success btn-lg w-100 py-3 mb-5"
            onclick="calculateROI()">

            Calculate ROI

        </button>

        <!-- Results -->

        <div class="row g-4 text-center">

            <div class="col-lg-3 col-md-6">

                <div class="card shadow-sm h-100">

                    <div class="card-body py-4">

                        <h5>Investment</h5>

                        <h2 id="investmentResult">₹0</h2>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card shadow-sm h-100">

                    <div class="card-body py-4">

                        <h5>Net Benefit</h5>

                        <h2 id="benefitResult">₹0</h2>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card shadow-sm h-100">

                    <div class="card-body py-4">

                        <h5>ROI</h5>

                        <h2 id="roiResult">0%</h2>

                    </div>

                </div>

            </div>

            <div class="col-lg-3 col-md-6">

                <div class="card shadow-sm h-100">

                    <div class="card-body py-4">

                        <h5>Payback</h5>

                        <h2 id="paybackResult">0 Years</h2>

                    </div>

                </div>

            </div>

        </div>

        <div class="text-center mt-5">

            <button class="btn btn-success btn-lg px-5">

                Save Company Data

            </button>

        </div>

    </div>

</div>
