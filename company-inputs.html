</head>

<!-- Header -->

<section class="hero py-5">

<div class="container">

<h1 class="display-5 fw-bold">

Company Inputs

</h1>

<p>

Enter company financial and operational information.

</p>

</div>

</section>

<!-- FORM -->

<div class="container py-5">

<div class="card shadow-lg p-4">

<h3 class="mb-4">

Financial Parameters

</h3>

<div class="row">

<div class="col-md-6 mb-3">

<label>Company Name</label>

<input
type="text"
class="form-control"
placeholder="ABC Manufacturing">

</div>

<div class="col-md-6 mb-3">

<label>Industry</label>

<select class="form-select">

<option>Manufacturing</option>

<option>Automobile</option>

<option>Healthcare</option>

<option>Energy</option>

<option>Pharmaceutical</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>Annual Revenue (₹)</label>

<input
type="number"
class="form-control"
value="80000000">

</div>

<div class="col-md-6 mb-3">

<label>WACC (%)</label>

<input
type="number"
class="form-control"
value="12">

</div>

<div class="col-md-6 mb-3">

<label>Profit Margin (%)</label>

<input
type="number"
class="form-control"
value="25">

</div>

<div class="col-md-6 mb-3">

<label>Corporate Tax (%)</label>

<input
type="number"
class="form-control"
value="25">

</div>

</div>

</div>

</div>

<!-- ================= Operational Baseline ================= -->

<div class="container pb-5">

    <div class="card shadow-lg p-4">

        <h3 class="mb-4">
            Operational Baseline
        </h3>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label>Total Employees</label>
                <input type="number" class="form-control" value="5000">
            </div>

            <div class="col-md-6 mb-3">
                <label>Average Annual Salary (₹)</label>
                <input type="number" class="form-control" value="800000">
            </div>

            <div class="col-md-6 mb-3">
                <label>Annual Energy Consumption (kWh)</label>
                <input type="number" class="form-control" value="5000000">
            </div>

            <div class="col-md-6 mb-3">
                <label>Energy Cost per kWh (₹)</label>
                <input type="number" class="form-control" value="9">
            </div>

            <div class="col-md-6 mb-3">
                <label>Annual Water Consumption (KL)</label>
                <input type="number" class="form-control" value="50000">
            </div>

            <div class="col-md-6 mb-3">
                <label>Water Cost per KL (₹)</label>
                <input type="number" class="form-control" value="85">
            </div>

            <div class="col-md-6 mb-3">
                <label>Annual Waste Generated (Tonnes)</label>
                <input type="number" class="form-control" value="500">
            </div>

            <div class="col-md-6 mb-3">
                <label>Waste Disposal Cost per Tonne (₹)</label>
                <input type="number" class="form-control" value="3000">
            </div>

        </div>

    </div>

</div>

<!-- Emissions -->

<div class="container pb-5">

<div class="card shadow-lg p-4">

<h3 class="mb-4">

Emissions Baseline

</h3>

<div class="row">

<div class="col-md-4">

<label>Scope 1</label>

<input class="form-control"
value="50000">

</div>

<div class="col-md-4">

<label>Scope 2</label>

<input class="form-control"
value="70000">

</div>

<div class="col-md-4">

<label>Scope 3</label>

<input class="form-control"
value="200000">

</div>

</div>

<div class="text-center mt-4">

<button class="btn btn-success btn-lg">

Save Company Data

</button>

</div>

</div>

</div>
